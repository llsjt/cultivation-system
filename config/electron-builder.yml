appId: local.cultivation.system
productName: CultivationSystem
directories:
  output: release
  buildResources: build
files:
  - out/**
  - package.json
asarUnpack:
  - node_modules/better-sqlite3/**
  - node_modules/bindings/**
extraResources:
  - from: build/icon.png
    to: icon.png
  - from: drizzle
    to: drizzle
npmRebuild: false
nodeGypRebuild: false
win:
  icon: build/icon.ico
  signAndEditExecutable: false
  target:
    - portable
